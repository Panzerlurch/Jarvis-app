<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Jarvis</title>
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; }
  html, body {
    background: #05070d;
  }
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: -apple-system, Roboto, sans-serif;
    color: #e8edf5;
    position: relative;
  }
  #galaxyCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    display: block;
  }
  .nebula {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 65% 45% at 22% 22%, rgba(130,100,255,0.38), transparent 62%),
      radial-gradient(ellipse 55% 40% at 82% 18%, rgba(80,200,255,0.30), transparent 62%),
      radial-gradient(ellipse 60% 50% at 50% 88%, rgba(255,90,210,0.22), transparent 62%);
    animation: nebulaDrift 20s ease-in-out infinite alternate;
  }
  .app-shell {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px;
    padding-top: max(24px, env(safe-area-inset-top));
    box-sizing: border-box;
  }
  @keyframes nebulaDrift {
    0%   { transform: scale(1) translate(0, 0); opacity: 0.85; }
    50%  { transform: scale(1.15) translate(2%, -3%); opacity: 1; }
    100% { transform: scale(1.05) translate(-2%, 2%); opacity: 0.9; }
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 4px;
    color: #6fd3ff;
  }
  .subtitle {
    font-size: 13px;
    color: #7a8699;
    margin-bottom: 4px;
  }
  .build-tag {
    font-size: 10px;
    color: #445066;
    margin-bottom: 20px;
    letter-spacing: 0.5px;
  }
  .scroll-area {
    width: 100%;
    max-width: 380px;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .mic-wrap {
    position: relative;
    width: 160px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .pulse {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: rgba(111, 211, 255, 0.15);
    display: none;
  }
  .pulse.active {
    display: block;
    animation: pulse 1.4s ease-out infinite;
  }
  @keyframes pulse {
    0% { transform: scale(0.8); opacity: 0.8; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  #micBtn {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, #1e2a3d, #141b28);
    box-shadow: 0 0 0 1px #2c3a52, 0 8px 24px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.2s ease;
  }
  #micBtn:active { transform: scale(0.94); }
  #micBtn.listening {
    box-shadow: 0 0 0 2px #6fd3ff, 0 0 30px rgba(111,211,255,0.5);
  }
  #micBtn svg { width: 42px; height: 42px; fill: #6fd3ff; }
  #stopBtn {
    margin-top: 18px;
    padding: 16px 32px;
    border-radius: 14px;
    border: none;
    background: #ff4d4d;
    color: white;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(255,77,77,0.4);
    flex-shrink: 0;
  }
  #stopBtn:active { transform: scale(0.96); }
  #playBtn {
    margin-top: 14px;
    padding: 12px 24px;
    border-radius: 12px;
    border: 1px solid #6fd3ff;
    background: rgba(111,211,255,0.12);
    color: #6fd3ff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  #playBtn:active { transform: scale(0.96); }
  #status {
    margin-top: 28px;
    font-size: 14px;
    color: #9fb0c7;
    min-height: 20px;
    text-align: center;
    max-width: 320px;
  }
  #transcript {
    margin-top: 14px;
    font-size: 16px;
    color: #e8edf5;
    text-align: center;
    max-width: 340px;
    min-height: 24px;
  }
  #response {
    margin-top: 20px;
    font-size: 14px;
    color: #6fd3ff;
    text-align: center;
    max-width: 340px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .copy-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 6px;
  }
  .copy-btn {
    font-size: 11px;
    background: #1e2a3d;
    border: 1px solid #2c3a52;
    color: #9fb0c7;
    padding: 4px 10px;
    border-radius: 8px;
    cursor: pointer;
  }
  .copy-btn:active { background: #2c3a52; }
  .copy-btn.copied { color: #6fd3ff; border-color: #6fd3ff; }
  .autopost-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    font-size: 13px;
    color: #9fb0c7;
    flex-shrink: 0;
  }
  .switch {
    position: relative;
    width: 44px;
    height: 24px;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background: #2c3a52;
    border-radius: 24px;
    transition: 0.2s;
  }
  .slider:before {
    position: absolute;
    content: "";
    height: 18px; width: 18px;
    left: 3px; bottom: 3px;
    background: #e8edf5;
    border-radius: 50%;
    transition: 0.2s;
  }
  input:checked + .slider { background: #6fd3ff; }
  input:checked + .slider:before { transform: translateX(20px); background: #0a0e14; }
  .settings {
    position: fixed;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: #556173;
    font-size: 20px;
    cursor: pointer;
  }
  .settings-panel {
    position: fixed;
    inset: 0;
    background: rgba(10,14,20,0.96);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 10;
  }
  .settings-panel.open { display: flex; }
  .settings-panel label {
    font-size: 13px;
    color: #9fb0c7;
    margin-bottom: 8px;
    align-self: flex-start;
    max-width: 320px;
    width: 100%;
  }
  .settings-panel input {
    width: 100%;
    max-width: 320px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #2c3a52;
    background: #141b28;
    color: #e8edf5;
    font-size: 14px;
    margin-bottom: 20px;
  }
  .settings-panel button.save {
    padding: 12px 28px;
    border-radius: 10px;
    border: none;
    background: #6fd3ff;
    color: #0a0e14;
    font-weight: 600;
    cursor: pointer;
  }
  .close-settings {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: #9fb0c7;
    font-size: 22px;
    cursor: pointer;
  }
</style>
</head>
<body>

<canvas id="galaxyCanvas"></canvas>
<div class="nebula"></div>

<div class="app-shell">

<h1>JARVIS</h1>
<div class="subtitle">Sprachassistent</div>
<div class="build-tag">Build 2026-07-07-v9</div>

<div class="mic-wrap">
  <div class="pulse" id="pulse"></div>
  <button id="micBtn">
    <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
  </button>
</div>

<button id="stopBtn" style="display:none;">⏹ STOPP &amp; SENDEN</button>

<div id="status">Tippen zum Sprechen</div>

<div class="scroll-area">
  <div id="transcript"></div>
  <div class="copy-row" id="transcriptCopyRow" style="display:none;">
    <button class="copy-btn" id="copyTranscript">📋 Text kopieren</button>
  </div>
  <div id="response"></div>
  <div class="copy-row" id="responseCopyRow" style="display:none;">
    <button class="copy-btn" id="copyResponse">📋 Antwort kopieren</button>
  </div>
  <button id="playBtn" style="display:none;">▶ Antwort abspielen</button>
</div>

<div class="autopost-row">
  <label class="switch">
    <input type="checkbox" id="autopostToggle">
    <span class="slider"></span>
  </label>
  <span>Automatisch posten</span>
</div>

<button class="settings" id="settingsBtn">⚙</button>

<div class="settings-panel" id="settingsPanel">
  <button class="close-settings" id="closeSettings">✕</button>
  <label>Webhook-URL deines n8n-Workflows</label>
  <input type="text" id="webhookInput" placeholder="https://n8n-production-8008.up.railway.app/webhook/...">
  <button class="save" id="saveWebhook">Speichern</button>
</div>

<audio id="player" style="display:none;"></audio>

</div><!-- /app-shell -->

<script>
// --- Galaxy-Hintergrund: twinkelndes Sternenfeld ---
(function initGalaxy() {
  const canvas = document.getElementById('galaxyCanvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let w, h;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    const count = Math.floor((w * h) / 2600);
    stars = Array.from({ length: count }, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() * 1.8 + 0.5,
      baseAlpha: Math.random() * 0.5 + 0.45,
      twinkleSpeed: Math.random() * 0.015 + 0.004,
      phase: Math.random() * Math.PI * 2,
      driftX: (Math.random() - 0.5) * 0.04,
      driftY: (Math.random() - 0.5) * 0.04,
      hue: Math.random() < 0.15 ? '#a8c8ff' : (Math.random() < 0.3 ? '#ffd9f0' : '#ffffff')
    }));
  }

  function tick(t) {
    ctx.clearRect(0, 0, w, h);
    for (const s of stars) {
      const twinkle = Math.sin(t * s.twinkleSpeed + s.phase) * 0.5 + 0.5;
      const alpha = s.baseAlpha * (0.4 + 0.6 * twinkle);
      s.x += s.driftX;
      s.y += s.driftY;
      if (s.x < 0) s.x = w; if (s.x > w) s.x = 0;
      if (s.y < 0) s.y = h; if (s.y > h) s.y = 0;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.hue;
      ctx.globalAlpha = alpha;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(tick);
  }

  resize();
  window.addEventListener('resize', resize);
  requestAnimationFrame(tick);
})();

let webhookUrl = "";
let sessionActive = false;
let recognition = null;

const micBtn = document.getElementById('micBtn');
const stopBtn = document.getElementById('stopBtn');
const pulse = document.getElementById('pulse');
const statusEl = document.getElementById('status');
const transcriptEl = document.getElementById('transcript');
const responseEl = document.getElementById('response');
const settingsBtn = document.getElementById('settingsBtn');
const settingsPanel = document.getElementById('settingsPanel');
const closeSettings = document.getElementById('closeSettings');
const webhookInput = document.getElementById('webhookInput');
const saveWebhook = document.getElementById('saveWebhook');
const player = document.getElementById('player');
const playBtn = document.getElementById('playBtn');

playBtn.addEventListener('click', () => {
  player.play().then(() => {
    playBtn.style.display = 'none';
    statusEl.textContent = 'Tippen zum Sprechen';
  }).catch((err) => {
    statusEl.textContent = 'Konnte nicht abspielen: ' + err.message;
  });
});
const transcriptCopyRow = document.getElementById('transcriptCopyRow');
const responseCopyRow = document.getElementById('responseCopyRow');
const copyTranscriptBtn = document.getElementById('copyTranscript');
const copyResponseBtn = document.getElementById('copyResponse');
const autopostToggle = document.getElementById('autopostToggle');

// Autopost-Zustand laden/speichern
try {
  autopostToggle.checked = localStorage.getItem('jarvis-autopost') === 'true';
} catch (e) {}
autopostToggle.addEventListener('change', () => {
  try { localStorage.setItem('jarvis-autopost', autopostToggle.checked); } catch (e) {}
});

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = '✓ Kopiert';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove('copied');
    }, 1500);
  });
}

copyTranscriptBtn.addEventListener('click', () => {
  copyText(transcriptEl.textContent.replace(/^"|"$/g, ''), copyTranscriptBtn);
});
copyResponseBtn.addEventListener('click', () => {
  copyText(responseEl.textContent, copyResponseBtn);
});

function loadWebhook() {
  try {
    const saved = localStorage.getItem('jarvis-webhook-url');
    if (saved) {
      webhookUrl = saved;
      webhookInput.value = webhookUrl;
    } else {
      settingsPanel.classList.add('open');
    }
  } catch (e) {
    settingsPanel.classList.add('open');
  }
}

saveWebhook.addEventListener('click', () => {
  const val = webhookInput.value.trim();
  if (!val) return;
  webhookUrl = val;
  try {
    localStorage.setItem('jarvis-webhook-url', val);
  } catch (e) { console.error(e); }
  settingsPanel.classList.remove('open');
  statusEl.textContent = 'Tippen zum Sprechen';
});

settingsBtn.addEventListener('click', () => settingsPanel.classList.add('open'));
closeSettings.addEventListener('click', () => settingsPanel.classList.remove('open'));

let finalSegments = []; // fertige, abgeschlossene Satzteile
let currentInterim = '';
let liveSessionFinal = ''; // finaler Text der gerade laufenden Mini-Session
let manualStop = false;

function setupRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    statusEl.textContent = 'Spracherkennung wird von diesem Browser nicht unterstützt. Bitte Chrome verwenden.';
    micBtn.disabled = true;
    return null;
  }
  const r = new SpeechRecognition();
  r.lang = 'de-DE';
  // EINE durchgehende Session statt vieler verketteter Mini-Sessions.
  // Weniger Neustarts = viel kleineres Zeitfenster für Race Conditions beim Stoppen.
  r.continuous = true;
  r.interimResults = true;
  r.maxAlternatives = 1;

  r.onstart = () => {
    micBtn.classList.add('listening');
    pulse.classList.add('active');
    statusEl.textContent = 'Ich höre zu... (nochmal tippen zum Beenden)';
  };

  r.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    if (!manualStop) statusEl.textContent = 'Fehler: ' + e.error;
  };

  r.onresult = (event) => {
    if (manualStop) return;
    // Auf diesem Gerät ist jedes neue 'final'-Ergebnis oft eine gewachsene Version
    // des vorherigen (z.B. "so" -> "so jetzt" -> "so jetzt noch"), kein eigenständiges
    // neues Segment. Deshalb NUR das letzte (= längste/vollständigste) verwenden,
    // niemals mehrere final-Ergebnisse aufsummieren.
    let interim = '';
    let latestFinal = null;
    for (let i = 0; i < event.results.length; i++) {
      const res = event.results[i];
      if (res.isFinal) {
        latestFinal = res[0].transcript.trim();
      } else {
        interim += res[0].transcript;
      }
    }
    if (latestFinal !== null) liveSessionFinal = latestFinal;
    currentInterim = interim;
    renderTranscript();
  };

  r.onend = () => {
    if (liveSessionFinal) {
      const last = finalSegments[finalSegments.length - 1];
      if (!last) {
        finalSegments.push(liveSessionFinal);
      } else if (liveSessionFinal === last) {
        // exaktes Duplikat - ignorieren
      } else if (liveSessionFinal.startsWith(last)) {
        // gewachsene Version des letzten Segments - ersetzen statt anhängen
        finalSegments[finalSegments.length - 1] = liveSessionFinal;
      } else if (last.startsWith(liveSessionFinal)) {
        // neues Ergebnis ist nur ein kürzerer Teil des schon Gespeicherten - ignorieren
      } else {
        finalSegments.push(liveSessionFinal);
      }
      liveSessionFinal = '';
      currentInterim = '';
    }

    if (sessionActive && !manualStop) {
      try { r.start(); } catch (e) {
        setTimeout(() => { try { if (sessionActive && !manualStop) r.start(); } catch (e2) {} }, 300);
      }
      return;
    }
    stopListening();
  };

  return r;
}

function renderTranscript() {
  const parts = finalSegments.slice();
  if (liveSessionFinal) parts.push(liveSessionFinal);
  const text = (parts.join(' ') + ' ' + currentInterim).trim();
  transcriptEl.textContent = text ? '"' + text + '"' : '';
}

function collectFullText() {
  const parts = finalSegments.slice();
  if (liveSessionFinal) parts.push(liveSessionFinal);
  if (currentInterim) parts.push(currentInterim);
  return parts.join(' ').replace(/\s+/g, ' ').trim();
}

function stopListening() {
  micBtn.classList.remove('listening');
  pulse.classList.remove('active');
}

let starting = false; // verhindert Doppel-Start während der Mikrofon-Berechtigungsabfrage
let stopping = false; // verhindert Mehrfach-Senden bei mehreren schnellen Stopp-Taps

function doStop() {
  if (stopping) return; // schon in Bearbeitung - zweiter Tap macht nichts kaputt, sendet nicht doppelt
  stopping = true;

  sessionActive = false;
  manualStop = true;
  stopListening();
  micBtn.style.display = 'flex';
  stopBtn.style.display = 'none';

  const text = collectFullText();
  if (text) {
    transcriptEl.textContent = '"' + text + '"';
    transcriptCopyRow.style.display = 'flex';
    sendToJarvis(text);
  } else {
    statusEl.textContent = 'Tippen zum Sprechen';
  }

  try { recognition && recognition.abort(); } catch (e) {}
  recognition = null;
  liveSessionFinal = '';

  setTimeout(() => { stopping = false; }, 500);
}

stopBtn.addEventListener('click', doStop);

micBtn.addEventListener('click', async () => {
  if (!webhookUrl) {
    settingsPanel.classList.add('open');
    return;
  }

  // Dieser Button ist jetzt NUR noch zum Starten da (wird während der Aufnahme
  // versteckt und durch den separaten roten Stopp-Button ersetzt).
  if (starting || sessionActive) return;
  starting = true;
  sessionActive = true;
  stopping = false;

  micBtn.style.display = 'none';
  stopBtn.style.display = 'block';

  finalSegments = [];
  currentInterim = '';
  liveSessionFinal = '';
  manualStop = false;
  transcriptEl.textContent = '';
  responseEl.textContent = '';
  transcriptCopyRow.style.display = 'none';
  responseCopyRow.style.display = 'none';
  playBtn.style.display = 'none';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    stream.getTracks().forEach(track => track.stop());
  } catch (err) {
    statusEl.textContent = 'Mikrofon-Zugriff verweigert: ' + err.message;
    starting = false;
    sessionActive = false;
    micBtn.style.display = 'flex';
    stopBtn.style.display = 'none';
    return;
  }

  recognition = setupRecognition();
  if (recognition) {
    try { recognition.start(); } catch (e) { /* already started */ }
  }
  starting = false;
});

async function sendToJarvis(text) {
  statusEl.textContent = 'Jarvis denkt nach...';
  try {
    const res = await fetch(webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text, autopost: autopostToggle.checked })
    });

    const contentType = res.headers.get('content-type') || '';
    let audioUrl = null;
    let replyText = null;

    if (contentType.includes('application/json')) {
      const data = await res.json();
      const payload = Array.isArray(data) ? data[0] : data;
      audioUrl = payload.audioUrl || payload.audio_url || payload.audio || null;
      replyText = payload.text || payload.response || payload.message || JSON.stringify(payload);
    } else if (contentType.includes('audio')) {
      const blob = await res.blob();
      audioUrl = URL.createObjectURL(blob);
      replyText = '(Audio-Antwort)';
    } else {
      replyText = await res.text();
    }

    statusEl.textContent = 'Tippen zum Sprechen';
    responseEl.textContent = replyText || 'Antwort erhalten';
    if (replyText) responseCopyRow.style.display = 'flex';

    if (audioUrl) {
      player.src = audioUrl;
      playBtn.style.display = 'none';
      player.play().catch(() => {
        statusEl.textContent = 'Antwort bereit';
        playBtn.style.display = 'block';
      });
    } else if ('speechSynthesis' in window && replyText) {
      const utter = new SpeechSynthesisUtterance(replyText);
      utter.lang = 'de-DE';
      speechSynthesis.speak(utter);
    }
  } catch (err) {
    statusEl.textContent = 'Fehler beim Senden: ' + err.message;
  }
}

loadWebhook();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Jarvis</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at 50% 30%, #1a2332 0%, #0a0e14 70%);
    font-family: -apple-system, Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #e8edf5;
    padding: 24px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 4px;
    color: #6fd3ff;
  }
  .subtitle {
    font-size: 13px;
    color: #7a8699;
    margin-bottom: 40px;
  }
  .mic-wrap {
    position: relative;
    width: 160px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pulse {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: rgba(111, 211, 255, 0.15);
    display: none;
  }
  .pulse.active {
    display: block;
    animation: pulse 1.4s ease-out infinite;
  }
  @keyframes pulse {
    0% { transform: scale(0.8); opacity: 0.8; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  #micBtn {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, #1e2a3d, #141b28);
    box-shadow: 0 0 0 1px #2c3a52, 0 8px 24px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.2s ease;
  }
  #micBtn:active { transform: scale(0.94); }
  #micBtn.listening {
    box-shadow: 0 0 0 2px #6fd3ff, 0 0 30px rgba(111,211,255,0.5);
  }
  #micBtn svg { width: 42px; height: 42px; fill: #6fd3ff; }
  #status {
    margin-top: 28px;
    font-size: 14px;
    color: #9fb0c7;
    min-height: 20px;
    text-align: center;
    max-width: 320px;
  }
  #transcript {
    margin-top: 14px;
    font-size: 16px;
    color: #e8edf5;
    text-align: center;
    max-width: 340px;
    min-height: 24px;
  }
  #response {
    margin-top: 20px;
    font-size: 14px;
    color: #6fd3ff;
    text-align: center;
    max-width: 340px;
    line-height: 1.5;
  }
  .settings {
    position: fixed;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: #556173;
    font-size: 20px;
    cursor: pointer;
  }
  .settings-panel {
    position: fixed;
    inset: 0;
    background: rgba(10,14,20,0.96);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 10;
  }
  .settings-panel.open { display: flex; }
  .settings-panel label {
    font-size: 13px;
    color: #9fb0c7;
    margin-bottom: 8px;
    align-self: flex-start;
    max-width: 320px;
    width: 100%;
  }
  .settings-panel input {
    width: 100%;
    max-width: 320px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #2c3a52;
    background: #141b28;
    color: #e8edf5;
    font-size: 14px;
    margin-bottom: 20px;
  }
  .settings-panel button.save {
    padding: 12px 28px;
    border-radius: 10px;
    border: none;
    background: #6fd3ff;
    color: #0a0e14;
    font-weight: 600;
    cursor: pointer;
  }
  .close-settings {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    color: #9fb0c7;
    font-size: 22px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>JARVIS</h1>
<div class="subtitle">Sprachassistent</div>

<div class="mic-wrap">
  <div class="pulse" id="pulse"></div>
  <button id="micBtn">
    <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
  </button>
</div>

<div id="status">Tippen zum Sprechen</div>
<div id="transcript"></div>
<div id="response"></div>

<button class="settings" id="settingsBtn">⚙</button>

<div class="settings-panel" id="settingsPanel">
  <button class="close-settings" id="closeSettings">✕</button>
  <label>Webhook-URL deines n8n-Workflows</label>
  <input type="text" id="webhookInput" placeholder="https://n8n-production-8008.up.railway.app/webhook/...">
  <button class="save" id="saveWebhook">Speichern</button>
</div>

<audio id="player" style="display:none;"></audio>

<script>
let webhookUrl = "";
let recognizing = false;
let recognition = null;

const micBtn = document.getElementById('micBtn');
const pulse = document.getElementById('pulse');
const statusEl = document.getElementById('status');
const transcriptEl = document.getElementById('transcript');
const responseEl = document.getElementById('response');
const settingsBtn = document.getElementById('settingsBtn');
const settingsPanel = document.getElementById('settingsPanel');
const closeSettings = document.getElementById('closeSettings');
const webhookInput = document.getElementById('webhookInput');
const saveWebhook = document.getElementById('saveWebhook');
const player = document.getElementById('player');

function loadWebhook() {
  try {
    const saved = localStorage.getItem('jarvis-webhook-url');
    if (saved) {
      webhookUrl = saved;
      webhookInput.value = webhookUrl;
    } else {
      settingsPanel.classList.add('open');
    }
  } catch (e) {
    settingsPanel.classList.add('open');
  }
}

saveWebhook.addEventListener('click', () => {
  const val = webhookInput.value.trim();
  if (!val) return;
  webhookUrl = val;
  try {
    localStorage.setItem('jarvis-webhook-url', val);
  } catch (e) { console.error(e); }
  settingsPanel.classList.remove('open');
  statusEl.textContent = 'Tippen zum Sprechen';
});

settingsBtn.addEventListener('click', () => settingsPanel.classList.add('open'));
closeSettings.addEventListener('click', () => settingsPanel.classList.remove('open'));

function setupRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    statusEl.textContent = 'Spracherkennung wird von diesem Browser nicht unterstützt. Bitte Chrome verwenden.';
    micBtn.disabled = true;
    return null;
  }
  const r = new SpeechRecognition();
  r.lang = 'de-DE';
  r.interimResults = false;
  r.maxAlternatives = 1;

  r.onstart = () => {
    recognizing = true;
    micBtn.classList.add('listening');
    pulse.classList.add('active');
    statusEl.textContent = 'Ich höre zu...';
    transcriptEl.textContent = '';
    responseEl.textContent = '';
  };

  r.onerror = (e) => {
    statusEl.textContent = 'Fehler: ' + e.error;
    stopListening();
  };

  r.onend = () => {
    stopListening();
  };

  r.onresult = (event) => {
    const text = event.results[0][0].transcript;
    transcriptEl.textContent = '"' + text + '"';
    sendToJarvis(text);
  };

  return r;
}

function stopListening() {
  recognizing = false;
  micBtn.classList.remove('listening');
  pulse.classList.remove('active');
}

micBtn.addEventListener('click', () => {
  if (!webhookUrl) {
    settingsPanel.classList.add('open');
    return;
  }
  if (recognizing) {
    recognition && recognition.stop();
    return;
  }
  if (!recognition) recognition = setupRecognition();
  if (recognition) {
    try { recognition.start(); } catch (e) { /* already started */ }
  }
});

async function sendToJarvis(text) {
  statusEl.textContent = 'Jarvis denkt nach...';
  try {
    const res = await fetch(webhookUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text })
    });

    const contentType = res.headers.get('content-type') || '';
    let audioUrl = null;
    let replyText = null;

    if (contentType.includes('application/json')) {
      const data = await res.json();
      const payload = Array.isArray(data) ? data[0] : data;
      audioUrl = payload.audioUrl || payload.audio_url || payload.audio || null;
      replyText = payload.text || payload.response || payload.message || JSON.stringify(payload);
    } else if (contentType.includes('audio')) {
      const blob = await res.blob();
      audioUrl = URL.createObjectURL(blob);
      replyText = '(Audio-Antwort)';
    } else {
      replyText = await res.text();
    }

    statusEl.textContent = 'Tippen zum Sprechen';
    responseEl.textContent = replyText || 'Antwort erhalten';

    if (audioUrl) {
      player.src = audioUrl;
      player.play().catch(() => {
        statusEl.textContent = 'Antwort bereit (Play antippen zum Abspielen)';
      });
    } else if ('speechSynthesis' in window && replyText) {
      const utter = new SpeechSynthesisUtterance(replyText);
      utter.lang = 'de-DE';
      speechSynthesis.speak(utter);
    }
  } catch (err) {
    statusEl.textContent = 'Fehler beim Senden: ' + err.message;
  }
}

loadWebhook();
</script>
</body>
</html>
